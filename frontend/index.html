<!doctype html>
<html lang="zh-CN" data-theme="focus-paper" data-theme-mode="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ainovel Atelier</title>
    <script>
      (() => {
        try {
          const userId = localStorage.getItem("ainovel::auth::user_id") || "local-user";
          const appMode = localStorage.getItem(`ainovel::app_mode::${userId}`);
          const raw = localStorage.getItem(`ainovel::theme::${userId}`);
          const parsed = raw ? JSON.parse(raw) : null;
          const mode = parsed?.mode === "dark" ? "dark" : "light";
          const family = appMode === "studio" ? "studio-ledger" : "focus-paper";
          const root = document.documentElement;
          root.dataset.theme = family;
          root.dataset.themeMode = mode;
          if (mode === "dark") root.classList.add("dark");
          if (mode === "light") root.classList.remove("dark");
        } catch {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
